<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KARAOKE PARTY!</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-yellow: #f0ff00;
            --hot-pink: #ff007f;
            --electric-blue: #00e5ff;
            --game-scale: 22vh; 
        }

        body, html {
            background: #000;
            color: #fff;
            font-family: 'Fredoka', sans-serif;
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* iPad Fixed Background */
        #bg-video-main {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: -1; 
        }

        /* Banner Spacer (35% gap for your Karaoke Title) */
        .banner-space {
            height: 35vh;
            width: 100%;
            pointer-events: none;
        }

        .game-area-bottom {
            height: 65vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            box-sizing: border-box;
            z-index: 1;
        }

        #game-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1.5vh;
            margin-bottom: 3vh;
        }

        .box {
            width: var(--game-scale); 
            height: var(--game-scale);
            border: 0.6vh solid var(--electric-blue);
            border-radius: 3vh;
            background: rgba(0,0,0,0.4) url('box-design.png') center/cover no-repeat;
            box-shadow: 0 0 2vh rgba(0, 229, 255, 0.4);
            transition: transform 0.2s;
        }

        .box.shimmer {
            border-color: var(--neon-yellow) !important;
            box-shadow: 0 0 8vh var(--neon-yellow) !important;
            transform: scale(1.1);
            filter: brightness(1.5);
            z-index: 10;
        }

        #start-btn {
            padding: 2.5vh 12vw;
            font-size: 5vh;
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(45deg, var(--hot-pink), #ff0044);
            color: white;
            border: 0.5vh solid white;
            border-radius: 100px;
            box-shadow: 0 0 4vh var(--hot-pink);
            -webkit-appearance: none;
        }

        /* Overlays */
        #countdown-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 500;
            justify-content: center; align-items: center;
            font-size: 25vh; color: var(--neon-yellow);
            text-shadow: 0 0 50px var(--neon-yellow);
        }

        #video-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            z-index: 600;
        }

        #video-blur-bg {
            position: absolute;
            width: 110%; height: 110%;
            top: -5%; left: -5%;
            object-fit: cover;
            filter: blur(40px) brightness(0.4);
        }

        #game-video {
            position: relative;
            width: 100%; height: 100%;
            object-fit: contain;
            z-index: 602;
        }

        .controls-top {
            position: fixed; top: 15px; left: 15px;
            display: flex; gap: 10px; z-index: 200;
            background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 50px;
            border: 1px solid var(--electric-blue); backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

    <video id="bg-video-main" autoplay muted loop playsinline webkit-playsinline>
        <source src="background-loop.mp4" type="video/mp4">
    </video>

    <div class="controls-top">
        <input type="range" id="size-slider" min="12" max="28" value="22" oninput="adjustSize(this.value)">
    </div>

    <div class="banner-space"></div>

    <div class="game-area-bottom">
        <div id="game-grid">
            <div class="box" id="box-0"></div>
            <div class="box" id="box-1"></div>
            <div class="box" id="box-2"></div>
            <div class="box" id="box-3"></div>
            <div class="box" id="box-4"></div>
            <div class="box" id="box-5"></div>
            <div class="box" id="box-6"></div>
            <div class="box" id="box-7"></div>
            <div class="box" id="box-8"></div>
            <div class="box" id="box-9"></div>
        </div>
        <button id="start-btn" onclick="initiateGame()">SING!</button>
    </div>

    <div id="countdown-overlay">READY?</div>

    <div id="video-overlay">
        <video id="video-blur-bg" muted playsinline webkit-playsinline></video>
        <video id="game-video" playsinline webkit-playsinline></video>
    </div>

    <audio id="sfx-shimmer" src="shimmer.mp3" loop preload="auto"></audio>
    <audio id="sfx-stop" src="reveal.mp3" preload="auto"></audio>

    <script>
        // Updated song list to match your files
        const songVideos = ["song1.mp4", "song2.mp4", "song3.mp4", "song4.mp4", "song5.mp4"];
        const goodJobVideo = "good-job.mp4";
        
        const boxes = document.querySelectorAll('.box');
        const overlay = document.getElementById('video-overlay');
        const countOverlay = document.getElementById('countdown-overlay');
        const videoPlayer = document.getElementById('game-video');
        const blurPlayer = document.getElementById('video-blur-bg');
        const startBtn = document.getElementById('start-btn');
        const sfxShimmer = document.getElementById('sfx-shimmer');
        const sfxStop = document.getElementById('sfx-stop');
        const bgVideo = document.getElementById('bg-video-main');

        function adjustSize(val) { document.documentElement.style.setProperty('--game-scale', val + 'vh'); }

        function initiateGame() {
            // Unblock and force play background
            sfxShimmer.play().then(() => sfxShimmer.pause());
            sfxStop.play().then(() => sfxStop.pause());
            videoPlayer.play().then(() => videoPlayer.pause());
            if (bgVideo.paused) bgVideo.play();

            runSelectionCycle();
        }

        function runSelectionCycle() {
            startBtn.style.visibility = 'hidden';
            let count = 0;
            let duration = 15 + Math.floor(Math.random() * 10);
            
            sfxShimmer.currentTime = 0;
            sfxShimmer.play();

            const interval = setInterval(() => {
                boxes.forEach(b => b.classList.remove('shimmer'));
                boxes[count % 10].classList.add('shimmer');
                count++;
                
                if (count > duration) {
                    clearInterval(interval);
                    sfxShimmer.pause();
                    sfxStop.play();
                    // Choose from the 5 available songs
                    setTimeout(() => startCountdown(count % 5), 1000);
                }
            }, 130);
        }

        function startCountdown(videoIndex) {
            countOverlay.style.display = 'flex';
            const steps = ["READY?", "3", "2", "1", "GO!"];
            let i = 0;

            const countInterval = setInterval(() => {
                if (i < steps.length) {
                    countOverlay.innerText = steps[i];
                    i++;
                } else {
                    clearInterval(countInterval);
                    countOverlay.style.display = 'none';
                    playSequence(videoIndex);
                }
            }, 850);
        }

        function playSequence(index) {
            overlay.style.display = 'block';
            const src = songVideos[index];
            videoPlayer.src = src;
            blurPlayer.src = src;
            
            videoPlayer.load();
            blurPlayer.load();
            
            videoPlayer.play();
            blurPlayer.play();

            videoPlayer.onended = () => {
                if(videoPlayer.getAttribute('src') !== goodJobVideo) {
                    videoPlayer.src = goodJobVideo;
                    blurPlayer.src = goodJobVideo;
                    videoPlayer.load();
                    videoPlayer.play();
                    blurPlayer.play();
                } else {
                    overlay.style.display = 'none';
                    startBtn.style.visibility = 'visible';
                    boxes.forEach(b => b.classList.remove('shimmer'));
                }
            };
        }
    </script>
</body>
</html>
